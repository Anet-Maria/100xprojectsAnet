<!DOCTYPE html>
<html>
<head>
    <title>Shopping Cart</title>

</head>

<body>

    <div class="navbar">
        <span>
            LOGO
            <input type="text" placeholder="Search">
        </span>

        <span>
            <a href="#">About Us</a>
            <a href="#">Contact</a>
            <a href="#">Sign Up</a>
            <a href="#">Login</a>
        </span>
    </div>

    <br>

    <div class="main">

        <div class="left-side" id="tot">
            Total Items: 5
        </div>

        <div class="center-side">

            <div class="procard">
                <div class="image-box">IMAGE1</div>
                <div>Shirt</div>
                <div>₹500</div>
                <button onclick="addItem('Shirt',500)">+</button>
            </div>

            <div class="procard">
                <div class="image-box">IMAGE2</div>
                <div>Shoes</div>
                <div>₹1000</div>
                <button onclick="addItem('Shoes',1000)">+</button>
            </div>

            <div class="procard">
                <div class="image-box">IMAGE3</div>
                <div>Watch</div>
                <div>₹1500</div>
                <button onclick="addItem('Watch',1500)">+</button>
            </div>

            <div class="procard">
                <div class="image-box">IMAGE4</div>
                <div>Bag</div>
                <div>₹800</div>
                <button onclick="addItem('Bag',800)">+</button>
            </div>

            <div class="procard">
                <div class="image-box">IMAGE5</div>
                <div>Cap</div>
                <div>₹300</div>
                <button onclick="addItem('Cap',300)">+</button>
            </div>

        </div>

        <div class="right-side">
            <div id="itms">
                Added Items: 0
            </div>

            <hr>

            <div id="itml">
                <strong>Items List:</strong>
            </div>

            <hr>

            <div id="pr">
                Total Price: ₹0
            </div>
        </div>

    </div>

    <script>

        let totalItems = 5;
        let addedItems = 0;
        let totalPrice = 0;

        function addItem(name, price) {

            totalItems--;
            addedItems++;
            totalPrice += price;

            document.getElementById("tot").innerHTML =
                "Total Items: " + totalItems;

            document.getElementById("itms").innerHTML =
                "Added Items: " + addedItems;

            document.getElementById("pr").innerHTML =
                "Total Price: ₹" + totalPrice;

            document.getElementById("itml").innerHTML +=
                `<div>${name} - ₹${price}</div>`;
        }

    </script>

</body>
</html>
